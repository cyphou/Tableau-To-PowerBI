<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="pipe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F3F2F1"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-8%" width="106%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#605E5C"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="url(#pipe-bg)" rx="10"/>

  <!-- Step 1: Source -->
  <rect x="15" y="40" width="120" height="120" rx="10" fill="#E97627" filter="url(#s)"/>
  <text x="75" y="78" font-family="Segoe UI, sans-serif" font-size="28" fill="white" text-anchor="middle">📄</text>
  <text x="75" y="102" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">.twb / .twbx</text>
  <text x="75" y="118" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">.tds / .tfl</text>
  <text x="75" y="134" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Server API</text>
  <text x="75" y="150" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">.hyper data</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="100" x2="175" y2="100" stroke="#605E5C" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step 2: Extract -->
  <rect x="180" y="40" width="155" height="120" rx="10" fill="#0078D4" filter="url(#s)"/>
  <text x="257" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🔍 EXTRACT</text>
  <text x="257" y="88" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Parse Tableau XML</text>
  <text x="257" y="105" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Convert formulas → DAX</text>
  <text x="257" y="122" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Build M queries</text>
  <text x="257" y="148" font-family="Segoe UI, sans-serif" font-size="10" fill="#F2C811" text-anchor="middle">→ 17 JSON files</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="100" x2="375" y2="100" stroke="#605E5C" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step 3: Generate -->
  <rect x="380" y="40" width="155" height="120" rx="10" fill="#0078D4" filter="url(#s)"/>
  <text x="457" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">⚙️ GENERATE</text>
  <text x="457" y="88" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">TMDL Semantic Model</text>
  <text x="457" y="105" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">PBIR v4.0 Report</text>
  <text x="457" y="122" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">118+ visual types</text>
  <text x="457" y="148" font-family="Segoe UI, sans-serif" font-size="10" fill="#F2C811" text-anchor="middle">→ .pbip project</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="100" x2="575" y2="100" stroke="#605E5C" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step 4: Validate -->
  <rect x="580" y="40" width="100" height="120" rx="10" fill="#8764B8" filter="url(#s)"/>
  <text x="630" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">✅ QA</text>
  <text x="630" y="90" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Validate</text>
  <text x="630" y="107" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Auto-fix</text>
  <text x="630" y="124" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Compare</text>
  <text x="630" y="148" font-family="Segoe UI, sans-serif" font-size="10" fill="#F2C811" text-anchor="middle">Lineage</text>

  <!-- Arrow 4 -->
  <line x1="685" y1="100" x2="715" y2="100" stroke="#605E5C" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step 5: Deploy -->
  <rect x="720" y="40" width="65" height="120" rx="10" fill="#107C10" filter="url(#s)"/>
  <text x="752" y="70" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🚀</text>
  <text x="752" y="92" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">PBI</text>
  <text x="752" y="109" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Fabric</text>
  <text x="752" y="126" font-family="Segoe UI, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Docker</text>

  <!-- Bottom label -->
  <text x="400" y="188" font-family="Segoe UI, sans-serif" font-size="11" fill="#605E5C" text-anchor="middle">python migrate.py workbook.twbx  →  fully automated, zero external dependencies</text>
</svg>
