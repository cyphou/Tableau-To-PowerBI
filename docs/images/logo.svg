<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004578"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E97627"/>
      <stop offset="100%" stop-color="#F2C811"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="160" rx="16" fill="url(#bg)"/>
  <!-- Tableau icon (stylized "T" in orange circle) -->
  <circle cx="70" cy="80" r="40" fill="#E97627"/>
  <text x="70" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">T</text>
  <!-- Arrow -->
  <polygon points="140,70 180,70 180,55 210,80 180,105 180,90 140,90" fill="url(#arrow-grad)"/>
  <!-- Power BI icon (stylized "PBI" in yellow circle) -->
  <circle cx="250" cy="80" r="40" fill="#F2C811"/>
  <text x="250" y="93" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1E1E2E" text-anchor="middle">PBI</text>
  <!-- Title text -->
  <text x="310" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="white">Tableau → Power BI</text>
  <text x="310" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#F2C811">Automated Migration Tool</text>
  <!-- Stats badges -->
  <rect x="310" y="112" width="70" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="345" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">180+ DAX</text>
  <rect x="388" y="112" width="80" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="428" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">118+ Visuals</text>
  <rect x="476" y="112" width="82" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="517" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">6,818+ Tests</text>
  <rect x="566" y="112" width="60" height="22" rx="4" fill="rgba(16,124,16,0.6)"/>
  <text x="596" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">100%</text>
</svg>
