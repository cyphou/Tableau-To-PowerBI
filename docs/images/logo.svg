<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="l-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A2240"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </radialGradient>
    <radialGradient id="l-tab" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF9040"/>
      <stop offset="60%" stop-color="#E97627"/>
      <stop offset="100%" stop-color="#C45A10"/>
    </radialGradient>
    <radialGradient id="l-pbi" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFD94A"/>
      <stop offset="60%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </radialGradient>
    <linearGradient id="l-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E97627"/>
      <stop offset="100%" stop-color="#F2C811"/>
    </linearGradient>
    <filter id="l-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="l-glow-sm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#l-bg)"/>

  <!-- Glow backdrops -->
  <circle cx="62" cy="100" r="36" fill="#E97627" opacity="0.08" filter="url(#l-glow)"/>
  <circle cx="138" cy="100" r="36" fill="#F2C811" opacity="0.08" filter="url(#l-glow)"/>

  <!-- Tableau orb -->
  <circle cx="62" cy="100" r="30" fill="url(#l-tab)"/>
  <ellipse cx="56" cy="90" rx="12" ry="8" fill="white" opacity="0.18"/>
  <text x="62" y="106" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">T</text>

  <!-- Arrow -->
  <path d="M 97 100 L 113 100" stroke="url(#l-arrow)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="113,94 125,100 113,106" fill="url(#l-arrow)"/>
  <path d="M 97 100 L 113 100" stroke="url(#l-arrow)" stroke-width="3" stroke-linecap="round" filter="url(#l-glow-sm)" opacity="0.5"/>

  <!-- PBI orb -->
  <circle cx="138" cy="100" r="30" fill="url(#l-pbi)"/>
  <ellipse cx="132" cy="90" rx="12" ry="8" fill="white" opacity="0.18"/>
  <text x="138" y="106" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PBI</text>

  <!-- Bottom text -->
  <text x="100" y="155" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">TABLEAU</text>
  <text x="100" y="170" font-family="Segoe UI, sans-serif" font-size="8" fill="#F2C811" text-anchor="middle" letter-spacing="1">TO POWER BI</text>

  <!-- Corner particles -->
  <circle cx="24" cy="28" r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="175" cy="32" r="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="30" cy="175" r="0.8" fill="rgba(255,255,255,0.06)"/>
  <circle cx="170" cy="172" r="1.2" fill="rgba(255,255,255,0.09)"/>
</svg>
